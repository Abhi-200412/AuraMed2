{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0 overflow-hidden">
            <div class="card-header bg-gradient text-white text-center py-4">
                <h3 class="mb-0"><i class="fas fa-sign-in-alt"></i> Welcome Back</h3>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control form-control-lg" name="username" required
                                placeholder="Enter username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control form-control-lg" name="password" required
                                placeholder="Enter password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-info fw-semibold">Register Now</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
