{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center min-vh-100 align-items-center" style="margin-top: -80px;">
    <div class="col-lg-5 col-md-7 fade-in-up">
        <div class="card shadow-lg border-0 overflow-hidden">
            <div class="card-header text-center py-4 border-bottom-0 pt-5">
                <div class="d-inline-block rounded-circle p-3 mb-3"
                    style="background: rgba(0, 230, 118, 0.1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);">
                    <i class="fas fa-user-plus fa-2x" style="color: #00E676;"></i>
                </div>
                <h3 class="fw-bold mb-1 text-white">Create Account</h3>
                <p class="text-white-50 mb-0">Join AuraMed today</p>
            </div>

            <div class="card-body p-4 p-md-5 pt-2">
                <form method="POST">
                    <div class="mb-4 delay-1 fade-in-up">
                        <label class="form-label text-light">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control form-control-lg bg-transparent" name="username"
                                required placeholder="Choose a username">
                        </div>
                    </div>

                    <div class="mb-4 delay-2 fade-in-up">
                        <label class="form-label text-light">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control form-control-lg bg-transparent" name="password"
                                required placeholder="Create a password">
                        </div>
                    </div>

                    <div class="delay-3 fade-in-up mt-5">
                        <button type="submit" class="btn btn-success w-100 btn-lg">
                            Register <i class="fas fa-check ms-2 fs-6"></i>
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4 delay-3 fade-in-up">
                    <p class="mb-0 text-muted">Already have an account?
                        <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none"
                            style="color: #00E676;">Login Here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
